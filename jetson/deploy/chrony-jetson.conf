# jetson/deploy/chrony-jetson.conf
# Install ON THE JETSON as /etc/chrony/conf.d/maverick.conf:
#   sudo apt install chrony
#   sudo cp jetson/deploy/chrony-jetson.conf /etc/chrony/conf.d/maverick.conf
#   sudo systemctl restart chrony
# Verify with: chronyc tracking   (Reference ID should be 192.168.100.1)
#
# The truck has no internet — the Pi (192.168.100.1, serving its own clock
# via deploy/chrony-pi.conf) is the ONLY time source. Timestamp agreement
# between the Jetson's vision frames and the Pi's OBD readings is what makes
# snapshot/reading alignment work, so this file is load-bearing.
#
# makestep 1.0 -1: step the clock at ANY offset on EVERY update, not just the
# first three — the Orin has no battery-backed RTC and boots in 1970, and
# vision_publisher gates frame publishing until the clock looks sane.
server 192.168.100.1 iburst minpoll 4 maxpoll 6
makestep 1.0 -1

name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Tauri (ARM64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            build-essential

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build Tauri app
        working-directory: client
        run: npm run tauri:build

      - name: Package client dist
        run: tar -czf client-dist.tar.gz -C client/dist .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="deploy-$(git rev-parse --short HEAD)"
          gh release create "$TAG" \
            --title "Deploy $(date -u +%Y-%m-%d) ($(git rev-parse --short HEAD))" \
            --notes "Built from [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" \
            --latest \
            client/src-tauri/target/release/maverick-telemetry \
            client-dist.tar.gz
